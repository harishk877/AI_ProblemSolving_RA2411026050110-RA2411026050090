<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tic-Tac-Toe | Problem 1</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --panel: #1a1a26;
    --border: #2a2a40;
    --accent-x: #ff3366;
    --accent-o: #00d4ff;
    --accent-draw: #ffcc00;
    --text: #e0e0f0;
    --muted: #6060a0;
    --glow-x: 0 0 20px #ff336688;
    --glow-o: 0 0 20px #00d4ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, #1a0a2e44 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #0a1a2e44 0%, transparent 50%);
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    width: 100%;
    max-width: 900px;
  }

  .game-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Controls */
  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 300px;
  }

  .controls label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .algo-select {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .algo-btn {
    flex: 1;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .algo-btn.active {
    border-color: var(--accent-o);
    color: var(--accent-o);
    box-shadow: var(--glow-o);
  }

  .side-select {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .side-btn {
    flex: 1;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .side-btn.active-x {
    border-color: var(--accent-x);
    color: var(--accent-x);
    box-shadow: var(--glow-x);
  }

  .side-btn.active-o {
    border-color: var(--accent-o);
    color: var(--accent-o);
    box-shadow: var(--glow-o);
  }

  .new-game-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--accent-x), #cc0044);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .new-game-btn:hover { opacity: 0.85; transform: scale(1.02); }

  /* Status */
  .status-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
    width: 300px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-bar.x-turn { border-color: var(--accent-x); color: var(--accent-x); }
  .status-bar.o-turn { border-color: var(--accent-o); color: var(--accent-o); }
  .status-bar.draw { border-color: var(--accent-draw); color: var(--accent-draw); }

  /* Board */
  .board-wrap {
    position: relative;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 300px;
    height: 300px;
  }

  .cell {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .cell:hover:not(.filled) {
    border-color: var(--muted);
    background: var(--surface);
    transform: scale(1.03);
  }

  .cell.x {
    color: var(--accent-x);
    border-color: var(--accent-x);
    box-shadow: var(--glow-x);
    cursor: default;
    animation: popIn 0.2s ease;
  }

  .cell.o {
    color: var(--accent-o);
    border-color: var(--accent-o);
    box-shadow: var(--glow-o);
    cursor: default;
    animation: popIn 0.2s ease;
  }

  .cell.filled { cursor: default; }

  .cell.winning {
    animation: winPulse 0.6s ease infinite alternate;
  }

  .cell.winning.x { box-shadow: 0 0 30px var(--accent-x); background: #ff336622; }
  .cell.winning.o { box-shadow: 0 0 30px var(--accent-o); background: #00d4ff22; }

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes winPulse {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
  }

  /* Stats Panel */
  .stats-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 300px;
  }

  .stats-title {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .algo-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .algo-stat {
    background: var(--surface);
    border-radius: 8px;
    padding: 10px;
    border: 1px solid var(--border);
  }

  .algo-stat .algo-name {
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .algo-stat .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    margin-bottom: 3px;
  }

  .algo-stat .stat-val {
    color: var(--accent-o);
    font-weight: bold;
  }

  .algo-stat.active-algo {
    border-color: var(--accent-o);
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .score-row:last-child { border-bottom: none; }

  .score-label { font-size: 0.75rem; color: var(--muted); }
  .score-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .score-val.x-score { color: var(--accent-x); }
  .score-val.o-score { color: var(--accent-o); }
  .score-val.draw-score { color: var(--accent-draw); }

  /* Move log */
  .move-log {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    width: 300px;
    max-height: 180px;
  }

  .move-log .stats-title { margin-bottom: 8px; }

  .log-entries {
    max-height: 130px;
    overflow-y: auto;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .log-entries::-webkit-scrollbar { width: 4px; }
  .log-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry { display: flex; gap: 8px; align-items: center; }
  .log-entry .move-num { color: var(--border); min-width: 20px; }
  .log-entry .move-who.x { color: var(--accent-x); }
  .log-entry .move-who.o { color: var(--accent-o); }

  /* Thinking indicator */
  .thinking {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    color: var(--accent-o);
  }

  .thinking.show { display: flex; }

  .think-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent-o);
    border-radius: 50%;
    margin: 0 1px;
    animation: blink 1s infinite;
  }

  .think-dots span:nth-child(2) { animation-delay: 0.2s; }
  .think-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  .badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.6rem;
    color: var(--accent-o);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<h1>AI Tic-Tac-Toe</h1>
<p class="subtitle">Problem 1 &nbsp;|&nbsp; Minimax vs Alpha-Beta Pruning</p>

<div class="container">
  <!-- Left column -->
  <div class="game-section">

    <div class="controls">
      <label>Algorithm</label>
      <div class="algo-select">
        <button class="algo-btn active" onclick="setAlgo('minimax')" id="btn-minimax">Minimax</button>
        <button class="algo-btn" onclick="setAlgo('alphabeta')" id="btn-alphabeta">Alpha-Beta</button>
      </div>

      <label>You play as</label>
      <div class="side-select">
        <button class="side-btn active-x" onclick="setSide('X')" id="btn-X">X</button>
        <button class="side-btn" onclick="setSide('O')" id="btn-O">O</button>
      </div>

      <button class="new-game-btn" onclick="newGame()">⟳ New Game</button>
    </div>

    <div class="status-bar" id="status">Your turn — play X</div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="thinking" id="thinking">
      <span>AI thinking</span>
      <div class="think-dots"><span></span><span></span><span></span></div>
    </div>

  </div>

  <!-- Right column -->
  <div class="game-section">

    <div class="stats-panel">
      <div class="stats-title">Algorithm Comparison</div>
      <div class="algo-comparison">
        <div class="algo-stat" id="stat-minimax">
          <div class="algo-name">Minimax</div>
          <div class="stat-row"><span>Nodes</span><span class="stat-val" id="mm-nodes">—</span></div>
          <div class="stat-row"><span>Time(ms)</span><span class="stat-val" id="mm-time">—</span></div>
        </div>
        <div class="algo-stat" id="stat-ab">
          <div class="algo-name">Alpha-Beta</div>
          <div class="stat-row"><span>Nodes</span><span class="stat-val" id="ab-nodes">—</span></div>
          <div class="stat-row"><span>Time(ms)</span><span class="stat-val" id="ab-time">—</span></div>
        </div>
      </div>

      <div class="stats-title" style="margin-top:10px;">Scoreboard</div>
      <div class="score-row">
        <span class="score-label">You (X)</span>
        <span class="score-val x-score" id="score-x">0</span>
      </div>
      <div class="score-row">
        <span class="score-label">AI (O)</span>
        <span class="score-val o-score" id="score-o">0</span>
      </div>
      <div class="score-row">
        <span class="score-label">Draws</span>
        <span class="score-val draw-score" id="score-d">0</span>
      </div>
    </div>

    <div class="move-log">
      <div class="stats-title">Move Log</div>
      <div class="log-entries" id="log"></div>
    </div>

  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let board = Array(9).fill(null);
  let humanPlayer = 'X';
  let aiPlayer = 'O';
  let currentAlgo = 'minimax';
  let gameOver = false;
  let scores = { X: 0, O: 0, D: 0 };
  let moveCount = 0;
  let mmStats = { nodes: null, time: null };
  let abStats = { nodes: null, time: null };

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // ─── Init ─────────────────────────────────────────────────────────────────
  function init() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.i = i;
      cell.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(cell);
    }
  }

  function newGame() {
    board = Array(9).fill(null);
    gameOver = false;
    moveCount = 0;
    document.getElementById('log').innerHTML = '';
    document.getElementById('thinking').classList.remove('show');
    renderBoard();
    updateStatus();

    if (humanPlayer === 'O') {
      // AI goes first
      setTimeout(aiMove, 300);
    }
  }

  // ─── Controls ─────────────────────────────────────────────────────────────
  function setAlgo(algo) {
    currentAlgo = algo;
    document.getElementById('btn-minimax').classList.toggle('active', algo === 'minimax');
    document.getElementById('btn-alphabeta').classList.toggle('active', algo === 'alphabeta');
    document.getElementById('stat-minimax').classList.toggle('active-algo', algo === 'minimax');
    document.getElementById('stat-ab').classList.toggle('active-algo', algo === 'alphabeta');
    newGame();
  }

  function setSide(side) {
    humanPlayer = side;
    aiPlayer = side === 'X' ? 'O' : 'X';
    document.getElementById('btn-X').className = 'side-btn' + (side === 'X' ? ' active-x' : '');
    document.getElementById('btn-O').className = 'side-btn' + (side === 'O' ? ' active-o' : '');
    newGame();
  }

  // ─── Game Logic ───────────────────────────────────────────────────────────
  function handleClick(i) {
    if (gameOver || board[i] || isAiTurn()) return;
    board[i] = humanPlayer;
    moveCount++;
    logMove(humanPlayer, i);
    renderBoard();

    const result = checkWinner(board);
    if (result) { endGame(result); return; }
    if (board.every(c => c)) { endGame('D'); return; }

    updateStatus('ai');
    setTimeout(aiMove, 200);
  }

  function isAiTurn() {
    const xs = board.filter(c => c === 'X').length;
    const os = board.filter(c => c === 'O').length;
    if (humanPlayer === 'X') return xs > os;
    return os >= xs;
  }

  function aiMove() {
    if (gameOver) return;
    document.getElementById('thinking').classList.add('show');

    setTimeout(() => {
      // Run BOTH algorithms for comparison
      const mmResult = runMinimax(board, aiPlayer);
      const abResult = runAlphaBeta(board, aiPlayer);

      mmStats = { nodes: mmResult.nodes, time: mmResult.time };
      abStats = { nodes: abResult.nodes, time: abResult.time };

      updateAlgoStats();

      // Use selected algorithm's move
      const chosen = currentAlgo === 'minimax' ? mmResult : abResult;
      board[chosen.move] = aiPlayer;
      moveCount++;
      logMove(aiPlayer, chosen.move);

      document.getElementById('thinking').classList.remove('show');
      renderBoard();

      const result = checkWinner(board);
      if (result) { endGame(result); return; }
      if (board.every(c => c)) { endGame('D'); return; }

      updateStatus('human');
    }, 10);
  }

  function checkWinner(b) {
    for (const [a, c, d] of WIN_LINES) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
    }
    return null;
  }

  function getWinLine(b) {
    for (const line of WIN_LINES) {
      const [a, c, d] = line;
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return line;
    }
    return null;
  }

  function endGame(result) {
    gameOver = true;
    if (result === 'D') {
      scores.D++;
      setStatus('draw', '— Draw! —');
    } else if (result === humanPlayer) {
      scores.X++;
      setStatus('x-turn', `🎉 You win!`);
    } else {
      scores.O++;
      setStatus('o-turn', `AI wins!`);
    }
    updateScores();

    if (result !== 'D') {
      const line = getWinLine(board);
      if (line) highlightWin(line, result);
    }
  }

  // ─── Minimax ───────────────────────────────────────────────────────────────
  function runMinimax(initialBoard, aiP) {
    let nodes = 0;
    const t0 = performance.now();

    function minimax(b, isMax) {
      nodes++;
      const winner = checkWinner(b);
      if (winner === aiP) return 10 - (b.filter(Boolean).length);
      if (winner) return b.filter(Boolean).length - 10;
      if (b.every(c => c)) return 0;

      const empties = b.map((c, i) => c ? -1 : i).filter(i => i >= 0);
      if (isMax) {
        let best = -Infinity;
        for (const i of empties) {
          b[i] = aiP;
          best = Math.max(best, minimax(b, false));
          b[i] = null;
        }
        return best;
      } else {
        let best = Infinity;
        const human = aiP === 'X' ? 'O' : 'X';
        for (const i of empties) {
          b[i] = human;
          best = Math.min(best, minimax(b, true));
          b[i] = null;
        }
        return best;
      }
    }

    const b = [...initialBoard];
    const empties = b.map((c, i) => c ? -1 : i).filter(i => i >= 0);
    let bestScore = -Infinity, bestMove = empties[0];

    for (const i of empties) {
      b[i] = aiP;
      const score = minimax(b, false);
      b[i] = null;
      if (score > bestScore) { bestScore = score; bestMove = i; }
    }

    return { move: bestMove, nodes, time: +(performance.now() - t0).toFixed(3) };
  }

  // ─── Alpha-Beta ────────────────────────────────────────────────────────────
  function runAlphaBeta(initialBoard, aiP) {
    let nodes = 0;
    const t0 = performance.now();

    function alphaBeta(b, isMax, alpha, beta) {
      nodes++;
      const winner = checkWinner(b);
      if (winner === aiP) return 10 - b.filter(Boolean).length;
      if (winner) return b.filter(Boolean).length - 10;
      if (b.every(c => c)) return 0;

      const empties = b.map((c, i) => c ? -1 : i).filter(i => i >= 0);
      const human = aiP === 'X' ? 'O' : 'X';

      if (isMax) {
        let best = -Infinity;
        for (const i of empties) {
          b[i] = aiP;
          best = Math.max(best, alphaBeta(b, false, alpha, beta));
          b[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break; // pruning
        }
        return best;
      } else {
        let best = Infinity;
        for (const i of empties) {
          b[i] = human;
          best = Math.min(best, alphaBeta(b, true, alpha, beta));
          b[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break; // pruning
        }
        return best;
      }
    }

    const b = [...initialBoard];
    const empties = b.map((c, i) => c ? -1 : i).filter(i => i >= 0);
    let bestScore = -Infinity, bestMove = empties[0];

    for (const i of empties) {
      b[i] = aiP;
      const score = alphaBeta(b, false, -Infinity, Infinity);
      b[i] = null;
      if (score > bestScore) { bestScore = score; bestMove = i; }
    }

    return { move: bestMove, nodes, time: +(performance.now() - t0).toFixed(3) };
  }

  // ─── Render ────────────────────────────────────────────────────────────────
  function renderBoard() {
    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.textContent = board[i] || '';
      cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} filled` : '');
    });
  }

  function highlightWin(line, player) {
    const cells = document.querySelectorAll('.cell');
    line.forEach(i => cells[i].classList.add('winning'));
  }

  function updateStatus(turn) {
    const el = document.getElementById('status');
    if (turn === 'ai') {
      el.className = 'status-bar o-turn';
      el.textContent = 'AI is thinking...';
    } else if (turn === 'human') {
      el.className = 'status-bar x-turn';
      el.textContent = `Your turn — play ${humanPlayer}`;
    }
  }

  function setStatus(cls, msg) {
    const el = document.getElementById('status');
    el.className = `status-bar ${cls}`;
    el.textContent = msg;
  }

  function updateScores() {
    document.getElementById('score-x').textContent = humanPlayer === 'X' ? scores.X : scores.O;
    document.getElementById('score-o').textContent = humanPlayer === 'X' ? scores.O : scores.X;
    document.getElementById('score-d').textContent = scores.D;
  }

  function updateAlgoStats() {
    document.getElementById('mm-nodes').textContent = mmStats.nodes?.toLocaleString() ?? '—';
    document.getElementById('mm-time').textContent = mmStats.time != null ? mmStats.time : '—';
    document.getElementById('ab-nodes').textContent = abStats.nodes?.toLocaleString() ?? '—';
    document.getElementById('ab-time').textContent = abStats.time != null ? abStats.time : '—';
  }

  function logMove(player, idx) {
    const log = document.getElementById('log');
    const row = Math.floor(idx / 3) + 1;
    const col = (idx % 3) + 1;
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="move-num">${moveCount}.</span><span class="move-who ${player.toLowerCase()}">${player}</span><span>→ row ${row}, col ${col}</span>`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function updateStatus(turn) {
    const el = document.getElementById('status');
    if (!turn) {
      el.className = 'status-bar x-turn';
      el.textContent = `Your turn — play ${humanPlayer}`;
    } else if (turn === 'ai') {
      el.className = 'status-bar o-turn';
      el.textContent = 'AI is thinking...';
    } else {
      el.className = 'status-bar x-turn';
      el.textContent = `Your turn — play ${humanPlayer}`;
    }
  }

  // ─── Boot ──────────────────────────────────────────────────────────────────
  init();
  newGame();
</script>
</body>
</html>
